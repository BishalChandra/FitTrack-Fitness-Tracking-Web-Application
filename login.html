<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | FitTrack</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="login-container">

  <!-- Logo -->
  <div class="logo">🏆 Fit<span>Track</span></div>
  <p class="tagline">Welcome back — let's keep moving 💪</p>

  <!-- Login Form -->
  <form onsubmit="login(event)">

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="youremail@gmail.com" required>

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••" required>

    <button type="submit" class="btn-submit">Login →</button>

  </form>

  <p id="formMsg" class="form-msg"></p>

  <div class="divider">or</div>

  <p class="register">
    New to FitTrack? <a href="register.html">Create an account</a>
  </p>

</div>

<script>
function login(e) {
  e.preventDefault();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const msg      = document.getElementById('formMsg');

  const saved = JSON.parse(localStorage.getItem('fittrack_user_data') || '{}');

  if (saved.email === email && saved.password === password) {
    localStorage.setItem('fittrack_user', 'true');
    msg.className = 'form-msg success';
    msg.textContent = '✅ Login successful! Redirecting…';
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 900);
  } else {
    msg.className = 'form-msg error';
    msg.textContent = '❌ Invalid email or password.';
  }
}
</script>

</body>
</html>
